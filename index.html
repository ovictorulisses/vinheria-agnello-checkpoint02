<!-- define que é HTML5 -->
<!DOCTYPE html>

<!-- inicia o site (idioma português) -->
<html lang="pt-br">

<!-- Cabeçalho -->
<head>

    <!-- permite acentos -->
    <meta charset="UTF-8">

    <!-- nome da aba do navegador -->
    <title>Vinharia Agnello</title>

    <!-- conecta o CSS -->
    <link rel="stylesheet" href="src/css/style.css">
</head>

<!-- Corpo -->
<body>

    <!-- cabeçalho (topo) -->
    <header class="header">

        <!-- imagem da logo -->
    <img src="src/assets/imgs/logotipo.png" alt="Logotipo" class="logo">

    <!-- agrupa título + descrição -->
    <div class="titulo">

        <!-- título principal -->
        <h1>Vinharia Agnello</h1>

        <!-- descrição -->
        <p>Sistema de Gerenciamento de Vinhos Artesanais</p>
    </div>

    <!-- fecha o topo -->
    </header>

    <!-- parte principal da página -->
    <main>
       
        <!-- imagem do vinho -->
        <img src="src/assets/imgs/vinho.jpeg" alt="Vinho Tinto Premium">

        <!-- bloco de conteúdo -->
        <section>

            <!-- título da seção -->
            <h2>Cadastro de Produtos</h2>

            <!-- texto explicativo -->
            <p>Clique no botão abaixo para iniciar o registro de uma nova safra no sistema.</p>
            
            <!-- botão -->
            <button onclick="window.location.reload()">Cadastrar Novo Vinho</button>
        </section>
    </main>

    <!-- conecta um arquivo JS -->
    <script src="src/js/script.js"></script>

<!-- fim do conteúdo -->
</body>

<!-- fim do documento -->
</html>
